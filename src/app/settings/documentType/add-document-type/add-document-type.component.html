
<div class="mandir-header">
  <div class="om-header">ॐ</div>
  <div class="mandir-title">Shri Krishna Mandir</div>
  <div class="mandir-subtitle">Document Voice Seva — Sacred Listening</div>
</div>
<div class="container">
  <div class="card">

    <!-- HEADER -->
    <div class="card-header">
      <!-- <div class="om-symbol">ॐ</div> -->

      <!-- <p class="card-subtitle">
        SHRI KRISHNA TEMPLE & FOUNDATION
      </p> -->

      <!-- <div class="seva-title">
        🌸 SEVA PRABANDHAN · सेवा प्रबंधन
      </div> -->

      <h2>ADD DOCUMENT TYPE</h2>

      <!-- <p class="header-desc">
        Register document classification for the foundation
      </p> -->

      <div class="header-divider">
        <span class="divider-line"></span>
        <span class="divider-icon">🪔</span>
        <span class="divider-line"></span>
      </div>
    </div>

    <!-- FORM -->
    <form [formGroup]="documentTypeForm">

      <!-- Document Type -->
      <div class="form-group">
        <label>DOCUMENT TYPE NAME <span class="req">*</span></label>

        <input
          type="text"
          formControlName="documentTypeName"
          placeholder="e.g. Donation Receipt, Trust Deed, Puja Schedule"
        />

        <div class="error"
             *ngIf="f.documentTypeName.touched && f.documentTypeName.invalid">
          Document type name is required
        </div>
      </div>

 

      <!-- Buttons -->
      <div class="btn-group">
        <button
          type="button"
          class="save-btn"
          (click)="saveDocumentType()"
          [disabled]="saving">
          {{ saving ? 'Saving...' : 'SAVE RECORD' }}
        </button>

        <button
          type="button"
          class="reset-btn"
          (click)="resetForm()">
          RESET
        </button>
      </div>

    </form>

    <div class="card-footer">
      <span>* Required fields</span>
      <span class="footer-right">जय श्री कृष्ण 🌸</span>
    </div>

  </div>
</div>
