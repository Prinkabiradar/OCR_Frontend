<div class="container mt-5">
  <div class="card shadow-sm border-0">

    <!-- Header -->
    <div class="card-header bg-white">
      <h5 class="mb-0 fw-bold">Add Document Type</h5>
    </div>

    <!-- Form -->
    <div class="card-body">
      <form [formGroup]="documentTypeForm">

        <!-- Document Type Name -->
        <div class="mb-3">
          <label class="form-label">
            Document Type Name <span class="text-danger">*</span>
          </label>

          <input
            type="text"
            class="form-control"
            formControlName="documentTypeName"
            placeholder="Enter document type name"
          />

          <div class="text-danger small mt-1"
               *ngIf="f.documentTypeName.touched && f.documentTypeName.invalid">
            Document type name is required
          </div>
        </div>

        <!-- Buttons -->
        <div class="d-flex justify-content-end gap-2 mt-4">

          <button
            type="button"
            class="btn btn-light"
            (click)="resetForm()">
            Reset
          </button>

          <button
            type="button"
            class="btn btn-primary"
            (click)="saveDocumentType()"
            [disabled]="saving">

            <span *ngIf="!saving">Save</span>
            <span *ngIf="saving" class="spinner-border spinner-border-sm"></span>
          </button>

        </div>

      </form>
    </div>

  </div>
</div>
