<div class="card">
  <!-- Search Section -->
  <div class="card-header">
    <div
      class="d-flex justify-content-between align-items-center flex-wrap gap-3 w-100"
    >
      <div class="d-flex align-items-center gap-2">
        <input
          type="text"
          [(ngModel)]="searchCriteria"
          (ngModelChange)="onSearchChange($event)"
          class="form-control w-250px"
          placeholder="Search documents..."
        />
        <button class="btn btn-light-primary btn-sm" (click)="search()">
          <i class="bi bi-search"></i> Search
        </button>
      </div>

      <button
        class="btn btn-primary btn-sm"
        (click)="goToAddDocument()"
        *ngIf="roleId !== 5"
      >
        <i class="bi bi-plus-circle"></i> Add
      </button>
    </div>
  </div>

  <!-- BODY -->
  <div class="card-body p-5">
    <!-- Loading -->
    <div *ngIf="isLoading" class="d-flex justify-content-center py-10">
      <span class="spinner-border text-primary"></span>
    </div>

    <!-- Table -->
    <div class="table-responsive px-4" *ngIf="!isLoading">
      <table class="table table-bordered align-middle">
        <thead class="table-light text-dark">
          <tr>
            <th>#</th>
            <th>Document Type Name</th>
            <th>View More</th>
            <th *ngIf="roleId !== 5">Edit</th>
            <th *ngIf="roleId !== 5">Delete</th>
          </tr>
        </thead>

        <tbody *ngIf="documents$ | async as tabledata">
          <tr *ngIf="tabledata.length === 0">
            <td colspan="5" class="text-center text-muted py-5">
              No Data Found
            </td>
          </tr>

          <tr *ngFor="let item of tabledata; let i = index">
            <td>{{ (currentPage - 1) * pageSize + i + 1 }}</td>
            <td>{{ item.DocumentTypeName }}</td>
            <td *ngIf="roleId === 5">
              <button
                class="btn btn-sm btn-light-primary"
                (click)="goToViewMore(item)"
              >
                <i class="bi bi-eye"></i> View More
              </button>
            </td>
            <td *ngIf="roleId !== 5">
              <button
                class="btn btn-sm btn-light-primary"
                (click)="goToEdit(item)"
              >
                <i class="bi bi-pencil"></i> Edit
              </button>
            </td>
            <td *ngIf="roleId !== 5">
              <button
                class="btn btn-sm btn-light-danger"
                (click)="confirmDelete(item)"
              >
                <i class="bi bi-trash"></i> Delete
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Pagination -->
  <div class="pagination d-flex justify-content-start align-items-center gap-2">
    <button (click)="goToPrevious()" [disabled]="!hasPrevious">Previous</button>
    <span class="mx-2">Page {{ currentPage }}</span>
    <button (click)="goToNext()" [disabled]="!hasNext">Next</button>
  </div>
</div>
