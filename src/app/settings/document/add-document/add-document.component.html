<div class="container mt-5">
  <div class="card shadow-sm border-0">

    <!-- Header -->
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
      <h5 class="mb-0 fw-bold">Add Document</h5>
    </div>

    <!-- Form -->
    <div class="card-body">
      <form [formGroup]="documentForm">

        <div class="row g-3">

          <!-- Document Type -->
          <div class="col-md-12">
            <label class="form-label">Document Type <span class="text-danger">*</span></label>
            <ng-select2
              [data]="documentTypedata"
              formControlName="documentTypeId"
              [options]="documentTypeoptions"
              class="w-100">
            </ng-select2>

            <div class="text-danger small mt-1"
                 *ngIf="f.documentTypeId.touched && f.documentTypeId.invalid">
              Document type is required
            </div>
          </div>

          <!-- Document Name -->
          <div class="col-md-12">
            <label class="form-label">Document Name <span class="text-danger">*</span></label>
            <input
              type="text"
              class="form-control"
              formControlName="documentName"
              placeholder="Enter document name" />

            <div class="text-danger small mt-1"
                 *ngIf="f.documentName.touched && f.documentName.invalid">
              Document name is required
            </div>
          </div>

        </div>

        <!-- Buttons -->
        <div class="d-flex justify-content-end gap-2 mt-4">

          <button
            type="button"
            class="btn btn-light"
            (click)="resetForm()">
            Reset
          </button>

          <button
            type="button"
            class="btn btn-primary"
            (click)="saveDocument()"
            [disabled]="saving">

            <span *ngIf="!saving">Save</span>
            <span *ngIf="saving" class="spinner-border spinner-border-sm"></span>
          </button>

        </div>

      </form>
    </div>

  </div>
</div>
