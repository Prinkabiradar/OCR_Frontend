<div class="card">

  <!-- 🔍 Search Section -->
  <div class="card-header">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 w-100">

      <!-- 🔍 Search Box + Button -->
      <div class="d-flex align-items-center gap-2">

        <!-- ❌ Removed icon + extra classes -->
        <input
          type="text"
          [(ngModel)]="searchCriteria"
          (ngModelChange)="onSearchChange($event)"
          class="form-control w-250px"
          placeholder="Search documents..."
        />

        <!-- Search Button -->
        <button class="btn btn-light-primary btn-sm" (click)="search()">
          <i class="bi bi-search"></i> Search
        </button>

      </div>

      <!-- ➕ Add Button -->
      <button class="btn btn-primary btn-sm" (click)="goToAddDocument()">
        <i class="bi bi-plus-circle"></i> Add
      </button>

    </div>
  </div>

  <!-- BODY -->
  <div class="card-body p-5">

    <!-- ⏳ Loading -->
    <div *ngIf="isLoading" class="d-flex justify-content-center py-5">
      <span class="spinner-border text-primary"></span>
    </div>

    <!-- 📊 Table -->
    <div class="table-responsive px-4" *ngIf="!isLoading">

      <!-- ❌ Removed heavy classes -->
      <table class="table table-bordered align-middle">

        <!-- HEADER -->
        <!-- ❌ Fixed duplicate class issue -->
        <thead class="table-light text-dark">
          <tr>
            <ng-container *ngIf="documents$ | async as tabledata">
              <ng-container *ngIf="tabledata.length > 0">
                <th *ngFor="let col of tabledata[0] | keyvalue">
                  {{ formatLabel(col.key) }}
                </th>
              </ng-container>
            </ng-container>
          </tr>
        </thead>

        <!-- BODY -->
        <tbody *ngIf="documents$ | async as tabledata">

          <!-- No Data -->
          <tr *ngIf="tabledata.length === 0">
            <td colspan="100" class="text-center text-muted py-5">
              No Data Found
            </td>
          </tr>

          <!-- Data -->
          <tr *ngFor="let item of tabledata">
            <td *ngFor="let col of item | keyvalue">
              {{ col.value }}
            </td>
          </tr>

        </tbody>

      </table>
    </div>
  </div>

  <!-- ⏮ Pagination -->
  <div class="pagination d-flex justify-content-start align-items-center gap-2">
  <button (click)="goToPrevious()" [disabled]="!hasPrevious">
    Previous
  </button>

  <span class="mx-2">Page {{ currentPage }}</span>

  <button (click)="goToNext()" [disabled]="!hasNext">
    Next
  </button>
</div>

</div>
