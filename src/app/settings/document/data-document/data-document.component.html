<div class="card">

  <!-- Search Section -->
  <div class="card-header">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 w-100">

      <div class="d-flex align-items-center gap-2">
        <input
          type="text"
          [(ngModel)]="searchCriteria"
          (ngModelChange)="onSearchChange($event)"
          class="form-control w-250px"
          placeholder="Search documents..."
        />
      </div>

      <button class="btn btn-primary btn-sm" (click)="goToAddDocument()">
        <i class="bi bi-plus-circle"></i> Add Document
      </button>

    </div>
  </div>

  <!-- BODY -->
  <div class="card-body p-5">

    <!-- Loading -->
    <div *ngIf="isLoading" class="d-flex justify-content-center py-5">
      <span class="spinner-border text-primary"></span>
    </div>

    <!-- Table -->
    <div class="table-responsive px-4" *ngIf="!isLoading">
      <table class="table table-bordered align-middle">

        <thead class="table-light text-dark">
          <tr>
            <th>#</th>
            <th>Document Name</th>
            <th>Edit</th>
            <th>Delete</th>
          </tr>
        </thead>

        <tbody *ngIf="documents$ | async as tabledata">

          <tr *ngIf="tabledata.length === 0">
            <td colspan="4" class="text-center text-muted py-5">
              No Data Found
            </td>
          </tr>

          <tr *ngFor="let item of tabledata; let i = index">
            <td>{{ (currentPage - 1) * pageSize + i + 1 }}</td>
            <td>{{ item.DocumentName }}</td>
            <td>
              <button class="btn btn-sm btn-light-primary" (click)="goToEdit(item)">
                <i class="bi bi-pencil"></i> Edit
              </button>
            </td>
            <td>
              <button class="btn btn-sm btn-light-danger" (click)="confirmDelete(item)">
                <i class="bi bi-trash"></i> Delete
              </button>
            </td>
          </tr>

        </tbody>
      </table>
    </div>
  </div>

  <!-- Pagination -->
  <div class="pagination-wrapper">
      <!-- LEFT -->
      <div class="pagination-left">
        <app-pagination-data
          [currentPage]="docCurrentPage"
          [totalPages]="totalPages"
          (pageChange)="onDocPageChange($event)"
        >
        </app-pagination-data>
      </div>

    </select>
  </div> -->

    of {{ totalRecords }} records
  </div> -->

</div>
