<div class="card">

  <!-- 🔍 Search Section -->
  <div class="card-header">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 w-100">

      <!-- 🔍 Search Box + Button -->
      <div class="d-flex align-items-center gap-2">

        <!-- ❌ Removed icon + extra classes -->
        <input
          type="text"
          [(ngModel)]="searchCriteria"
          (ngModelChange)="onSearchChange($event)"
          class="form-control w-250px"
          placeholder="Search documents..."
        />

        <!-- Search Button -->
        <button class="btn btn-light-primary btn-sm" (click)="search()">
          <i class="bi bi-search"></i> Search
        </button>

      </div>

      <!-- ➕ Add Button -->
      <button class="btn btn-primary btn-sm" (click)="goToAddDocument()">
        <i class="bi bi-plus-circle"></i> Add
      </button>

    </div>
  </div>

  <!-- BODY -->
  <div class="card-body p-5">

    <!-- ⏳ Loading -->
    <div *ngIf="isLoading" class="d-flex justify-content-center py-5">
      <span class="spinner-border text-primary"></span>
    </div>

    <!-- 📊 Table -->
    <div class="table-responsive px-4" *ngIf="!isLoading">

      <!-- ❌ Removed heavy classes -->
      <table class="table table-bordered align-middle">

        <!-- HEADER -->
        <!-- ❌ Fixed duplicate class issue -->
        <thead class="table-light text-dark">
          <tr>
            <ng-container *ngIf="documents$ | async as tabledata">
              <ng-container *ngIf="tabledata.length > 0">
                <th *ngFor="let col of tabledata[0] | keyvalue">
                  {{ formatLabel(col.key) }}
                </th>
              </ng-container>
            </ng-container>
          </tr>
        </thead>

        <!-- BODY -->
        <tbody *ngIf="documents$ | async as tabledata">

          <!-- No Data -->
          <tr *ngIf="tabledata.length === 0">
            <td colspan="100" class="text-center text-muted py-5">
              No Data Found
            </td>
          </tr>

          <!-- Data -->
          <tr *ngFor="let item of tabledata">
            <td *ngFor="let col of item | keyvalue">
              {{ col.value }}
            </td>
          </tr>

        </tbody>

      </table>
    </div>
  </div>

  <!-- ⏮ Pagination -->
  <div class="card-footer d-flex flex-wrap justify-content-between align-items-center gap-3">

    <!-- Page Size -->
    <div class="d-flex align-items-center gap-2">
      <span class="text-muted small">Showing</span>
      <select
        class="form-select form-select-sm w-auto"
        (change)="onPageSizeChange($event)"
        [value]="itemsPerPage"
      >
        <option [value]="10">10</option>
        <option [value]="25">25</option>
        <option [value]="50">50</option>
        <option [value]="100">100</option>
      </select>
      <span class="text-muted small">entries</span>
    </div>

    <!-- Pagination -->
    <ul class="pagination mb-0">

      <li class="page-item" [class.disabled]="currentPage === 1">
        <button class="page-link" (click)="onPageChange(1)">First</button>
      </li>

      <li class="page-item" [class.disabled]="currentPage === 1">
        <button class="page-link" (click)="onPageChange(currentPage - 1)">Prev</button>
      </li>

      <li class="page-item active">
        <span class="page-link">{{ currentPage }} / {{ totalPages }}</span>
      </li>

      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <button class="page-link" (click)="onPageChange(currentPage + 1)">Next</button>
      </li>

      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <button class="page-link" (click)="onPageChange(totalPages)">Last</button>
      </li>

    </ul>

    <!-- Total Records -->
    <div>
      <span class="text-muted small">
        Total: {{ totalRecords }}
      </span>
    </div>

  </div>

</div>
