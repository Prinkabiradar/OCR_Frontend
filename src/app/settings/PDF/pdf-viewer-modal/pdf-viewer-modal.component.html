<!-- ═══════════════════════════════════════════════════════════
     PDF Viewer Modal  –  generates PDF from ExtractedText pages
════════════════════════════════════════════════════════════ -->
<div class="pvm-overlay" *ngIf="isOpen" (click)="close()">
  <div class="pvm-container" (click)="$event.stopPropagation()">

    <!-- ── TOP BAR ─────────────────────────────────────────── -->
    <div class="pvm-topbar">
      <div class="pvm-topbar__left">
        <!-- Document icon -->
        <div class="pvm-topbar__icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0
                     2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </div>
        <div class="pvm-topbar__info">
          <span class="pvm-topbar__title">{{ documentName }}</span>
          <span class="pvm-topbar__meta" *ngIf="pages.length">
            {{ pages.length }} page{{ pages.length !== 1 ? 's' : '' }}
          </span>
        </div>
      </div>

      <div class="pvm-topbar__actions">
        <!-- Download button -->
        <button
          class="pvm-btn pvm-btn--download"
          (click)="downloadPdf()"
          [disabled]="isLoading || isGenerating || !pages.length"
          title="Download PDF">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download PDF
        </button>

        <!-- Suggestion button (RoleId 5 only) -->
        <button
          *ngIf="roleId === 5"
          class="pvm-btn pvm-btn--suggest"
          (click)="openSuggestion()"
          title="Suggest a change">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2
                     2 0 0 1 2 2z"/>
          </svg>
          Suggest
        </button>

        <!-- Close -->
        <button class="pvm-btn pvm-btn--close" (click)="close()" title="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── BODY ────────────────────────────────────────────── -->
    <div class="pvm-body">

      <!-- Loading pages -->
      <div *ngIf="isLoading" class="pvm-state">
        <div class="pvm-spinner"></div>
        <p>Loading document pages…</p>
      </div>

      <!-- Generating PDF -->
      <div *ngIf="!isLoading && isGenerating" class="pvm-state">
        <div class="pvm-spinner pvm-spinner--amber"></div>
        <p>Generating PDF…</p>
      </div>

      <!-- Error -->
      <div *ngIf="!isLoading && !isGenerating && errorMsg" class="pvm-state pvm-state--error">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p>{{ errorMsg }}</p>
        <button class="pvm-btn pvm-btn--retry" (click)="loadPages()">Retry</button>
      </div>

      <!-- PDF iframe viewer -->
      <iframe
        *ngIf="!isLoading && !isGenerating && pdfBlobUrl && !errorMsg"
        [src]="pdfBlobUrl"
        class="pvm-iframe"
        title="Document PDF Viewer"
        type="application/pdf">
      </iframe>

      <!-- No pages -->
      <div *ngIf="!isLoading && !isGenerating && !errorMsg && !pdfBlobUrl && pages.length === 0"
           class="pvm-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <p>No pages found for this document.</p>
      </div>

    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     SUGGESTION MODAL (inside same component)
════════════════════════════════════════════════════════════ -->
<div class="sg-overlay" *ngIf="showSuggestion" (click)="closeSuggestion()">
  <div class="sg-modal" (click)="$event.stopPropagation()">

    <div class="sg-modal__header">
      <div class="sg-modal__title-row">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Suggest a Change
      </div>
      <button class="sg-modal__close" (click)="closeSuggestion()">✕</button>
    </div>

    <div class="sg-modal__context">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      </svg>
      <span>{{ documentName }}</span>
    </div>

    <div class="sg-modal__body">
      <label class="sg-modal__label">Your Suggestion</label>
      <textarea
        class="sg-modal__textarea"
        rows="5"
        placeholder="Describe the issue or correction you found…"
        [(ngModel)]="suggestionText"
        [disabled]="suggestionLoading || suggestionSuccess">
      </textarea>

      <div class="sg-modal__error" *ngIf="suggestionError">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ suggestionError }}
      </div>

      <div class="sg-modal__success" *ngIf="suggestionSuccess">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Suggestion sent to the approver successfully!
      </div>
    </div>

    <div class="sg-modal__footer">
      <button class="pvm-btn pvm-btn--ghost" (click)="closeSuggestion()"
              [disabled]="suggestionLoading">Cancel</button>
      <!-- <button class="pvm-btn pvm-btn--suggest"
              (click)="submitSuggestion()"
              [disabled]="suggestionLoading || suggestionSuccess || !suggestionText.trim()">
        <span *ngIf="suggestionLoading" class="pvm-spinner pvm-spinner--btn"></span>
        <svg *ngIf="!suggestionLoading" width="13" height="13" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        {{ suggestionLoading ? 'Sending…' : suggestionSuccess ? 'Sent ✓' : 'Send' }}
      </button> -->
    </div>
  </div>
</div>
