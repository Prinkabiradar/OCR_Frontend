<ng-template #content let-modal>

  <div class="modal-header">
    <h5 class="modal-title">
      Suggestions - {{ documentName }}
    </h5>
    <button type="button" class="close" (click)="modal.dismiss()">
      ×
    </button>
  </div>

  <div class="modal-body">

    <label>Enter Suggestion:</label>

    <textarea
      class="form-control"
      rows="5"
      [(ngModel)]="suggestionText"
      placeholder="Enter mistake or correction..."
    ></textarea>

  </div>

  <div class="modal-footer">
    <button class="btn btn-secondary" (click)="modal.dismiss()">
      Cancel
    </button>

    <button class="btn btn-primary" (click)="saveSuggestion()">
      Save
    </button>
  </div>

</ng-template>
