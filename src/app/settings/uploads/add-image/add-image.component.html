<div class="upload-box">
  <input type="file" multiple (change)="onFileSelect($event)">

  </div>
</div>

<!-- ─── EDIT FORM CARD ─── -->
<div class="seva-card" *ngIf="showEditForm" [formGroup]="editForm">
  <div class="card-arch"></div>
  <div class="card-body">

    <div class="section-title">Document Parichay</div>

    <div class="form-section">

  <!-- ✅ DOCUMENT TYPE ROW -->
  <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 12px;">
    <label style="min-width: 130px;"><strong>Document Type:</strong></label>

    <!-- Dropdown -->
    <ng-select2
      [data]="documentTypedata"
      formControlName="documentTypeId"
      [options]="documentTypeoptions"
      style="width: 250px;">
    </ng-select2>

    <span style="color: #888;">OR</span>

        <input
          type="text"
          class="form-control"
          formControlName="documentType"
          placeholder="Enter new document type…"
          [class.disabled-input]="editForm.get('documentType')?.disabled"
          [attr.title]="editForm.get('documentType')?.disabled ? 'Clear dropdown to type here' : null">

    <!-- 
      ✅ Save button disabled when:
         1. Dropdown is selected (isDocumentTypeSaved = true)
         2. Already saved successfully (isDocumentTypeSaved = true)
         3. Input field is empty
    -->
    <button type="button"
            class="btn btn-primary"
            [disabled]="isDocumentTypeSaved || !editForm.get('documentType')?.value?.trim()"
            (click)="saveDocumentType()">
      {{ isDocumentTypeSaved ? '✅ Saved' : 'Save Type' }}
    </button>
  </div>

  <!-- ✅ DOCUMENT NAME ROW -->
  <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 12px;">
    <label style="min-width: 130px;"><strong>Document Name:</strong></label>

    <!-- Dropdown -->
    <ng-select2
      [data]="documentdata"
      formControlName="documentId"
      [options]="documentoptions"
      style="width: 250px;">
    </ng-select2>

    <span style="color: #888;">OR</span>

        <input
          type="text"
          class="form-control"
          formControlName="documentName"
          placeholder="Enter new document name…"
          [class.disabled-input]="editForm.get('documentName')?.disabled"
          [attr.title]="editForm.get('documentName')?.disabled ? 'Clear dropdown to type here' : null">

    <!-- 
      ✅ Save button disabled when:
         1. Dropdown is selected (isDocumentSaved = true)
         2. Already saved successfully (isDocumentSaved = true)
         3. Input field is empty
    -->
    <button type="button"
            class="btn btn-success"
            [disabled]="isDocumentSaved || !editForm.get('documentName')?.value?.trim()"
            (click)="saveDocument()">
      {{ isDocumentSaved ? '✅ Saved' : 'Save Document' }}
    </button>
  </div>

    </div>

    <div class="lotus-divider">🪷 &nbsp; 🪷 &nbsp; 🪷</div>

    <div class="section-title">OCR Seva — Edit Pages</div>

  <div formArrayName="pages">
    <div class="col-lg-6 form-label  " *ngFor="let page of pages.controls; let i=index" [formGroupName]="i"
         style="margin-bottom: 30px; border: 1px solid #ddd; padding: 15px; border-radius: 6px;">

        <div class="page-title">
          📄 {{ page.get('fileName')?.value }} — Page {{ page.get('pageNumber')?.value }}
        </div>

        <textarea
          class="page-textarea"
          rows="10"
          formControlName="extractedText">
        </textarea>

      <br>
      <!-- ✅ Save Page button shows warning if document not saved yet -->
      <button type="button"
              class="btn btn-warning mt-2"
              [title]="!documentId ? 'Save Document first' : 'Save this page'"
              (click)="savePage(i)">
        Save Page {{ page.get('pageNumber')?.value }}
      </button>

        <div class="warn-text" *ngIf="!documentId">
          ⚠️ Save the document above first
        </div>

      </div>
    </div>

    <!-- Save All Remaining -->
    <button
      type="button"
      class="btn btn-save-all"
      [disabled]="!documentId || savedPages.size === pages.length"
      (click)="saveAllRemainingPages()">
      {{ savedPages.size === pages.length
          ? '✅ All Pages Saved'
          : '🙏 Save All Remaining (' + (pages.length - savedPages.size) + ')' }}
    </button>

  </div>
</div>

<!-- ─── FOOTER ─── -->
<div class="mandir-footer">
  🪷 &nbsp; Jai Shri Krishna &nbsp; 🪷 &nbsp; सेवा परमो धर्मः
</div>
